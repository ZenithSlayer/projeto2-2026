version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${DB_NAME:-projeto22026}
      MARIADB_ROOT_HOST: "%"
    volumes:
      - db_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d:ro
    networks:
      - back-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: ${DB_NAME:-projeto22026}
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - back-network
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app_frontend
    restart: always
    environment:
      - WDS_SOCKET_PORT=443
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - front-network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      front-network:
      back-network:
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
networks:
  front-network:
  back-network:
