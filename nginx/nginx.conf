events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name 214K.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name 214K.local;

        ssl_certificate /etc/nginx/certs/214K.local.pem;
        ssl_certificate_key /etc/nginx/certs/214K.local-key.pem;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://214K.local wss://214K.local; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://picsum.photos;" always;
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://backend:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}